<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}

.tools-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-top:2rem}
.tool-card{background:#1a1a2e;border:1px solid #333;border-radius:12px;padding:1.5rem;transition:transform 0.2s,border-color 0.2s}
.tool-card:hover{transform:translateY(-2px);border-color:#667eea}
.tool-card a{color:#667eea;text-decoration:none;font-weight:600}

</head>
