<body>
    <header>
        <h1>Apostrophe Usage Checker</h1>
        <p class="subtitle">Find and fix apostrophe errors: its/it's, possessives, and contractions</p>
    </header>

    <div class="container">
        <div class="input-section">
            <label for="textInput">Paste your text here:</label>
            <textarea id="textInput" placeholder="The cat lost it's toy. The dogs bone was buried. (Check for apostrophe errors)"></textarea>
            <div class="button-group">
                <button class="btn-check" onclick="checkApostrophes()">Check Apostrophes</button>
                <button class="btn-clear" onclick="clearText()">Clear</button>
            </div>
            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="results-section" id="resultsSection">
            <h2 style="margin-bottom: 20px; color: #00d4aa;">Analysis Results</h2>
            <div id="resultsContainer"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Grammar Helper. Free grammar checking tools. All rights reserved.</p>
    </footer>

    <script>
        const apostropheRules = [
            {
                pattern: /\bit's\b/gi,
                context: 'possessive',
                rule: 'Its vs. It\'s',
                explanation: 'Use "it\'s" only when it\'s a contraction of "it is" or "it has". For possession, use "its" (without apostrophe).',
                detection: 'Found "it\'s" - verify if this is meant to be a contraction or possessive.',
                checkFunction: (match, context) => {
                    // Need more context to determine if it's correct
                    return /\bit's\s+(?:is|has|a|an|the|not|going|been|very)/.test(context);
                }
            },
            {
                pattern: /\bits\b(?!\s+(?:is|has))/gi,
                context: 'possessive-correct',
                rule: 'Its vs. It\'s',
                explanation: 'Use "its" (without apostrophe) for possession. Use "it\'s" only when you mean "it is" or "it has".',
                detection: 'Found "its" used correctly for possession.',
                checkFunction: () => true
            },
            {
                pattern: /\b([a-z]+)'s\s+([a-z]+)\b/gi,
                context: 'singular-possessive',
                rule: 'Singular Possessive',
                explanation: 'For singular nouns, add apostrophe + s to show possession.',
                detection: 'Singular possessive appears correct.',
                checkFunction: () => true
            },
            {
                pattern: /\b([a-z]+)s'\s+([a-z]+)\b/gi,
                context: 'plural-possessive',
                rule: 'Plural Possessive',
                explanation: 'For plural nouns ending in s, add only an apostrophe (no s) to show possession.',
                detection: 'Plural possessive appears correct.',
                checkFunction: () => true
            },
            {
                pattern: /\b([a-z]+)\s+([a-z]+)\b(?='s|\s)/gi,
                context: 'missing-apostrophe',
                rule: 'Missing Apostrophe (Common Plurals)',
                explanation: 'Some words are commonly misspelled with missing apostrophes (dogs instead of dog\'s, its instead of it\'s).',
                detection: 'This may need an apostrophe for possession.',
                checkFunction: (match) => {
                    const commonMissing = /\b(the|a|an)\s+(dogs|cats|books|students|teachers|peoples|friends|parents)\b/i;
                    return !commonMissing.test(match);
                }
            },
            {
                pattern: /\b(?:who|whose)'s\b/gi,
                context: 'who-contraction',
                rule: 'Who\'s vs. Whose',
                explanation: 'Use "who\'s" for "who is" or "who has". Use "whose" for possession.',
                detection: 'Found "who\'s" - verify context.',
                checkFunction: (match, context) => /who's\s+(?:is|has|been|going)/.test(context)
            },
            {
                pattern: /\b(?:they|there|their)'re\b/gi,
                context: 'contraction',
                rule: 'Common Contractions',
                explanation: 'Contractions use apostrophes to replace letters. "They\'re" = "they are", "there\'s" = "there is", "they\'re" ≠ "their".',
                detection: 'Contraction found.',
                checkFunction: () => true
            }
        ];

        function checkApostrophes() {
            const text = document.getElementById('textInput').value.trim();
            const errorMsg = document.getElementById('errorMessage');
            const resultsSection = document.getElementById('resultsSection');
            const resultsContainer = document.getElementById('resultsContainer');

            errorMsg.classList.remove('show');

            if (!text) {
                errorMsg.textContent = 'Please enter some text to check.';
                errorMsg.classList.add('show');
                resultsSection.classList.remove('active');
                return;
            }

            let issues = [];

            // Check for its/it's confusion
            const itsMatches = [...text.matchAll(/\bit('?s)\b/gi)];
            itsMatches.forEach(match => {
                const before = text.substring(Math.max(0, match.index - 50), match.index);
                const after = text.substring(match.index + match[0].length, Math.min(text.length, match.index + match[0].length + 50));
                const context = before + match[0] + after;

                if (match[1].toLowerCase() === "'s") {
                    // "it's" used - check if correct
                    if (!/it's\s+(?:is|has|[a-z]+ing|not|very|going|been|a|an|the)/i.test(context)) {
                        issues.push({
                            type: 'its-its-error',
                            found: match[0],
                            position: match.index,
                            rule: 'Its vs. It\'s',
                            explanation: '"It\'s" is a contraction of "it is" or "it has". If showing possession, use "its" (no apostrophe).',
                            correction: 'its',
                            context: context,
                            example: 'The cat licked its paws. / It\'s a beautiful day. (not It\'s paws)'
                        });
                    }
                }
            });

            // Check for missing apostrophes in possessives
            const possessivePatterns = [
                /\b(the|a|an)\s+(dogs|cats|books|students|teachers|friends|parents|children|peoples)\s+/gi,
                /\b(\w+)\s+(job|home|car|bag|pen|book|desk|idea)\b(?!'s)/gi
            ];

            possessivePatterns.forEach(pattern => {
                const matches = [...text.matchAll(pattern)];
                matches.forEach(match => {
                    if (!text.substring(match.index, match.index + match[0].length).includes("'s")) {
                        const word = match[0].trim().split(/\s+/).pop();
                        issues.push({
                            type: 'missing-possessive',
                            found: match[0],
                            position: match.index,
                            rule: 'Missing Possessive Apostrophe',
                            explanation: `The word "${word}" appears to need an apostrophe to show possession.`,
                            correction: word + "'s",
                            context: match[0],
                            example: 'The dog\'s bone / The students\' books'
                        });
                    }
                });
            });

            // Check for who's vs whose
            const whoseMatches = [...text.matchAll(/\b(who's|whose)\b/gi)];
            whoseMatches.forEach(match => {
                const before = text.substring(Math.max(0, match.index - 30), match.index);
                const after = text.substring(match.index + match[0].length, Math.min(text.length, match.index + match[0].length + 30));
                const context = before + match[0] + after;

                if (match[1].toLowerCase() === "who's") {
                    // Check if "who is" or "who has" makes sense
                    if (!/who's\s+(?:is|has|[a-z]+ing|not|very|been|here|there)/i.test(context)) {
                        issues.push({
                            type: 'whos-error',
                            found: match[0],
                            position: match.index,
                            rule: 'Who\'s vs. Whose',
                            explanation: '"Who\'s" is a contraction of "who is" or "who has". For possession, use "whose" (no apostrophe).',
                            correction: 'whose',
                            context: context,
                            example: 'Who\'s coming? (who is) / Whose book is this? (not Who\'s)'
                        });
                    }
                }
            });

            if (issues.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="result-item success">
                        <strong>✓ No apostrophe errors detected</strong>
                        <p style="margin-top: 10px; color: #a0a6b1;">Your apostrophe usage appears to be correct!</p>
                    </div>
                `;
            } else {
                let html = `
                    <div class="summary">
                        <div class="summary-stat">
                            <div class="stat-number">${issues.length}</div>
                            <div class="stat-label">Issues Found</div>
                        </div>
                    </div>
                `;

                issues.forEach((issue, idx) => {
                    html += `
                        <div class="result-item">
                            <strong style="color: #ff6b6b;">Issue ${idx + 1}: ${issue.rule}</strong>
                            <div class="issue-text">
                                <span class="error-highlight">${escapeHtml(issue.found)}</span>
                            </div>
                            <div class="rule-box">
                                <div class="rule-type">${issue.rule}</div>
                                <div class="rule-explanation">${issue.explanation}</div>
                            </div>
                            <div class="correction-box">
                                <div class="correction-label">Correction:</div>
                                <div class="correction-text">${escapeHtml(issue.correction)}</div>
                            </div>
                            <div class="examples">
                                <div class="examples-label">Examples:</div>
                                <div class="example-item"><span class="correct">✓ Correct:</span> ${escapeHtml(issue.example.split('/')[0].trim())}</div>
                                ${issue.example.includes('/') ? `<div class="example-item"><span class="incorrect">✗ Incorrect:</span> ${escapeHtml(issue.example.split('/')[1].trim())}</div>` : ''}
                            </div>
                        </div>
                    `;
                });

                resultsContainer.innerHTML = html;
            }

            resultsSection.classList.add('active');
        }

        function clearText() {
            document.getElementById('textInput').value = '';
            document.getElementById('resultsSection').classList.remove('active');
            document.getElementById('errorMessage').classList.remove('show');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('textInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                checkApostrophes();
            }
        });
    </script>
</body>
