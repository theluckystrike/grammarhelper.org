    <style>

<body>
    <header>
        <h1>Dangling Modifier Finder</h1>
        <p class="subtitle">Detect and fix dangling and misplaced modifiers</p>
    </header>

    <div class="container">
        <div class="input-section">
            <label for="textInput">Paste your text here:</label>
            <textarea id="textInput" placeholder="Walking down the street, the trees were beautiful. (Check for dangling modifiers)"></textarea>
            <div class="button-group">
                <button class="btn-check" onclick="findModifiers()">Find Modifiers</button>
                <button class="btn-clear" onclick="clearText()">Clear</button>
            </div>
            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="results-section" id="resultsSection">
            <h2 style="margin-bottom: 20px; color: #00d4aa;">Analysis Results</h2>
            <div id="resultsContainer"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Grammar Helper. Free grammar checking tools. All rights reserved.</p>
    </footer>

    <script>
        const modifierPatterns = [
            {
                pattern: /^[A-Z][\w\s,]*(?:ing|ed)\b[,.]?\s+(?:the\s+)?(?:author|narrator|writer|reader|listener|observer|viewer|teacher|student)\b/gm,
                type: 'dangling-participle',
                name: 'Dangling Participle',
                explanation: 'A participle phrase (verb form ending in -ing or -ed) appears at the start but the subject is not the one performing the action.',
                correction: 'Either change the subject or restructure the phrase to clarify who is performing the action.',
                examples: [
                    'WRONG: "Walking to school, the rain started." → CORRECT: "While walking to school, I noticed the rain started."',
                    'WRONG: "Exhausted from the hike, my tent was inviting." → CORRECT: "Exhausted from the hike, I found my tent inviting."'
                ]
            },
            {
                pattern: /(?:While|After|Before|During|Since|Upon|As)\s+[\w\s]+ing\b,\s+(?:the|a|an)\s+\w+/gm,
                type: 'misplaced-modifier',
                name: 'Misplaced Introductory Phrase',
                explanation: 'The introductory phrase does not clearly modify the subject that follows it.',
                correction: 'Rearrange the sentence so the modifier is next to the word it modifies.',
                examples: [
                    'WRONG: "While cooking dinner, the phone rang." → CORRECT: "While I was cooking dinner, the phone rang."',
                    'WRONG: "After reading the book, the movie seemed disappointing." → CORRECT: "After reading the book, I found the movie disappointing."'
                ]
            },
            {
                pattern: /\b(?:Looking|Considering|Given|Thinking|Assuming|Believing)\s+(?:that|about)?\s+[\w\s]+[,.]\s+(?:we|they|it|this|that|the)/gm,
                type: 'dangling-phrase',
                name: 'Dangling Introductory Phrase',
                explanation: 'A phrase modifies the wrong noun or has no clear subject.',
                correction: 'Clarify the subject of the introductory phrase or restructure the sentence.',
                examples: [
                    'WRONG: "Considering the evidence, it was clear he was guilty." → CORRECT: "Considering the evidence, we concluded he was guilty."',
                    'WRONG: "Looking at the data, several trends emerged." → CORRECT: "When looking at the data, I identified several trends."'
                ]
            },
            {
                pattern: /(?:To\s+[\w\s]+,)\s+(?:it|a\s+\w+|the\s+\w+)\b/gm,
                type: 'dangling-infinitive',
                name: 'Dangling Infinitive',
                explanation: 'An infinitive phrase at the start doesn\'t match the subject of the main clause.',
                correction: 'Change the subject to match who is performing the action in the infinitive.',
                examples: [
                    'WRONG: "To understand the problem, more data is needed." → CORRECT: "To understand the problem, we need more data."',
                    'WRONG: "To be successful, hard work is required." → CORRECT: "To be successful, you must work hard."'
                ]
            },
            {
                pattern: /\b(?:In|On|At|By|With|From)\s+[\w\s]+[,]\s+(?:the|a|an)\s+\w+\s+(?:was|were|is|are)/gm,
                type: 'misplaced-prepositional',
                name: 'Misplaced Prepositional Phrase',
                explanation: 'A prepositional phrase at the start seems to modify the wrong noun.',
                correction: 'Place the modifier closer to the noun it actually modifies.',
                examples: [
                    'WRONG: "In the parking lot, the car was stolen." → CORRECT: "The car was stolen in the parking lot."',
                    'WRONG: "By the river, the beautiful mansion was visible." → CORRECT: "The beautiful mansion by the river was visible."'
                ]
            }
        ];

        function findModifiers() {
            const text = document.getElementById('textInput').value.trim();
            const errorMsg = document.getElementById('errorMessage');
            const resultsSection = document.getElementById('resultsSection');
            const resultsContainer = document.getElementById('resultsContainer');

            errorMsg.classList.remove('show');

            if (!text) {
                errorMsg.textContent = 'Please enter some text to check.';
                errorMsg.classList.add('show');
                resultsSection.classList.remove('active');
                return;
            }

            let issues = [];
            const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];

            sentences.forEach(sentence => {
                modifierPatterns.forEach(pattern => {
                    const match = sentence.match(pattern.pattern);
                    if (match) {
                        issues.push({
                            sentence: sentence.trim(),
                            match: match[0],
                            pattern: pattern
                        });
                    }
                });
            });

            if (issues.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="result-item success">
                        <strong>✓ No dangling modifiers detected</strong>
                        <p style="margin-top: 10px; color: #a0a6b1;">Your modifiers appear to be correctly placed!</p>
                    </div>
                `;
            } else {
                let html = `
                    <div class="summary">
                        <div class="summary-stat">
                            <div class="stat-number">${issues.length}</div>
                            <div class="stat-label">Potential Issues</div>
                        </div>
                    </div>
                `;

                issues.forEach((issue, idx) => {
                    html += `
                        <div class="result-item">
                            <strong style="color: #ff6b6b;">Issue ${idx + 1}: ${issue.pattern.name}</strong>
                            <div class="issue-text">
                                <span class="error-highlight">${escapeHtml(issue.match)}</span>
                            </div>
                            <div class="explanation-box">
                                <div class="issue-type">${issue.pattern.name}</div>
                                <div class="issue-explanation">${issue.pattern.explanation}</div>
                            </div>
                            <div class="correction-box">
                                <div class="correction-label">How to fix:</div>
                                <div>${issue.pattern.correction}</div>
                            </div>
                            <div style="background: rgba(100, 150, 255, 0.05); padding: 15px; border-radius: 4px; margin-top: 10px;">
                                <strong style="color: #a0a6b1; font-size: 0.9em;">Examples:</strong>
                                <ul style="margin-left: 20px; margin-top: 8px; color: #c0c6d1;">
                                    ${issue.pattern.examples.map(ex => `<li style="margin: 5px 0; font-size: 0.9em;">${ex}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    `;
                });

                resultsContainer.innerHTML = html;
            }

            resultsSection.classList.add('active');
        }

        function clearText() {
            document.getElementById('textInput').value = '';
            document.getElementById('resultsSection').classList.remove('active');
            document.getElementById('errorMessage').classList.remove('show');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('textInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                findModifiers();
            }
        });
    </script>
</body>
</html>
