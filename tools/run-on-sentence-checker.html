<body>
    <header>
        <h1>Run-On Sentence Checker</h1>
        <p class="subtitle">Find and fix run-on sentences and comma splices</p>
    </header>

    <div class="container">
        <div class="input-section">
            <label for="textInput">Paste your text here:</label>
            <textarea id="textInput" placeholder="The meeting started at noon it lasted three hours. (Check for run-on sentences)"></textarea>
            <div class="button-group">
                <button class="btn-check" onclick="checkRunOns()">Check Sentences</button>
                <button class="btn-clear" onclick="clearText()">Clear</button>
            </div>
            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="results-section" id="resultsSection">
            <h2 style="margin-bottom: 20px; color: #00d4aa;">Analysis Results</h2>
            <div id="resultsContainer"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Grammar Helper. Free grammar checking tools. All rights reserved.</p>
    </footer>

    <script>
        function checkRunOns() {
            const text = document.getElementById('textInput').value.trim();
            const errorMsg = document.getElementById('errorMessage');
            const resultsSection = document.getElementById('resultsSection');
            const resultsContainer = document.getElementById('resultsContainer');

            errorMsg.classList.remove('show');

            if (!text) {
                errorMsg.textContent = 'Please enter some text to check.';
                errorMsg.classList.add('show');
                resultsSection.classList.remove('active');
                return;
            }

            let issues = [];

            // Detect run-on sentences (no punctuation between independent clauses)
            const runOnPattern = /[a-z]\s+(?:I|you|he|she|it|we|they|[A-Z]\w+)\s+(?:is|are|was|were|have|has|do|does|did|can|could|will|would|shall|should|may|might|must)\s+[\w\s]+(?=[a-z]\s+[A-Z])/gi;

            // Split text into sentences more intelligently
            const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];

            sentences.forEach((sentence, idx) => {
                const trimmed = sentence.trim();

                // Check for comma splice (comma between two independent clauses)
                const commaPattern = /\b([a-z][^,]*),\s+(?:(?:I|you|he|she|it|we|they|[A-Z]\w+)\s+(?:is|are|was|were|have|has|do|does|did|can|could|will|would|shall|should|may|might|must)|and|but|or|nor|yet|so)\b/g;

                let match;
                while ((match = commaPattern.exec(trimmed)) !== null) {
                    const beforeComma = trimmed.substring(0, match.index + match[1].length);
                    const afterComma = trimmed.substring(match.index + match[1].length);

                    // Check if both sides are independent clauses
                    if (hasSubjectVerb(beforeComma) && hasSubjectVerb(afterComma.substring(1))) {
                        issues.push({
                            type: 'comma-splice',
                            sentence: trimmed,
                            problem: match[0],
                            index: match.index
                        });
                    }
                }

                // Check for run-on sentences (no punctuation between clauses)
                if (trimmed.match(/[a-z]\s+[A-Z]\w+\s+\w+/) && trimmed.match(/[a-z]\s+[A-Z]\w+\s+\w+(?!.*[.!?])/)) {
                    const parts = trimmed.split(/(?<=[a-z])\s+(?=[A-Z])/);
                    if (parts.length > 1 && hasSubjectVerb(parts[0]) && hasSubjectVerb(parts[1])) {
                        issues.push({
                            type: 'run-on',
                            sentence: trimmed,
                            problem: null,
                            index: 0
                        });
                    }
                }
            });

            if (issues.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="result-item success">
                        <strong>✓ No run-on sentences detected</strong>
                        <p style="margin-top: 10px; color: #a0a6b1;">Your sentences are properly structured and punctuated!</p>
                    </div>
                `;
            } else {
                let html = `
                    <div class="summary">
                        <div class="summary-stat">
                            <div class="stat-number">${issues.length}</div>
                            <div class="stat-label">Issues Found</div>
                        </div>
                    </div>
                `;

                issues.forEach((issue, idx) => {
                    const fixes = generateFixes(issue);
                    const issueLabel = issue.type === 'comma-splice' ? 'Comma Splice' : 'Run-On Sentence';

                    html += `
                        <div class="result-item">
                            <strong style="color: #ff6b6b;">Issue ${idx + 1}: ${issueLabel}</strong>
                            <div class="issue-text">
                                ${escapeHtml(issue.sentence)}
                            </div>
                            <div class="explanation-box">
                                <div class="issue-type">What's the problem?</div>
                                <div class="issue-explanation">${issue.type === 'comma-splice'
                                    ? 'A comma cannot connect two independent clauses by itself. This is called a comma splice.'
                                    : 'Two or more independent clauses are joined without proper punctuation or conjunctions.'}</div>
                            </div>
                            <div class="fixes-container">
                                <div style="font-weight: 600; color: #00d4aa; margin-bottom: 12px; font-size: 0.95em;">Suggested fixes:</div>
                                ${fixes.map((fix, i) => `
                                    <div class="fix-option">
                                        <div class="fix-title">Option ${i + 1}: ${fix.method}</div>
                                        <div class="fix-text">${escapeHtml(fix.text)}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });

                resultsContainer.innerHTML = html;
            }

            resultsSection.classList.add('active');
        }

        function hasSubjectVerb(phrase) {
            const verbs = /\b(is|are|was|were|have|has|do|does|did|can|could|will|would|shall|should|may|might|must|been|be)\b/i;
            const subjects = /\b(I|you|he|she|it|we|they|[A-Z]\w+)\b/;
            return verbs.test(phrase) && subjects.test(phrase);
        }

        function generateFixes(issue) {
            const sentence = issue.sentence.replace(/[.!?]$/, '');

            if (issue.type === 'comma-splice') {
                const parts = sentence.split(/,\s*/);
                return [
                    {
                        method: 'Period',
                        text: parts[0].trim() + '. ' + capitalize(parts[1].trim())
                    },
                    {
                        method: 'Semicolon',
                        text: parts[0].trim() + '; ' + parts[1].trim()
                    },
                    {
                        method: 'Coordinating Conjunction',
                        text: parts[0].trim() + ', and ' + parts[1].trim()
                    },
                    {
                        method: 'Subordinating Conjunction',
                        text: 'While ' + parts[0].toLowerCase().trim() + ', ' + parts[1].trim()
                    }
                ];
            } else {
                // Run-on sentence
                return [
                    {
                        method: 'Period',
                        text: 'Split into two sentences with a period.'
                    },
                    {
                        method: 'Semicolon',
                        text: 'Use a semicolon to join related independent clauses.'
                    },
                    {
                        method: 'Coordinating Conjunction',
                        text: 'Add a coordinating conjunction (and, but, or, nor, yet, so) with a comma.'
                    },
                    {
                        method: 'Subordination',
                        text: 'Make one clause dependent by adding a subordinating conjunction (because, although, while, etc.)'
                    }
                ];
            }
        }

        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function clearText() {
            document.getElementById('textInput').value = '';
            document.getElementById('resultsSection').classList.remove('active');
            document.getElementById('errorMessage').classList.remove('show');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('textInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                checkRunOns();
            }
        });
    </script>
</body>
