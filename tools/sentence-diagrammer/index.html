<script>
  (function() {
    // ---------- dictionary (500+ tagged) ----------
    const dict = new Map([
      // determiners / articles
      ['the','det'],['a','det'],['an','det'],['this','det'],['that','det'],['these','det'],['those','det'],
      ['my','det'],['your','det'],['his','det'],['her','det'],['its','det'],['our','det'],['their','det'],
      // nouns (common)
      ['fox','n'],['dog','n'],['cat','n'],['mat','n'],['book','n'],['teacher','n'],['doctor','n'],
      ['man','n'],['woman','n'],['child','n'],['children','n'],['storm','n'],['rain','n'],['sun','n'],
      ['friend','n'],['house','n'],['car','n'],['tree','n'],['river','n'],['bird','n'],['fish','n'],
      ['food','n'],['water','n'],['city','n'],['country','n'],['world','n'],['life','n'],['day','n'],
      ['night','n'],['hand','n'],['eye','n'],['ear','n'],['leg','n'],['arm','n'],['head','n'],
      ['student','n'],['sister','n'],['brother','n'],['mother','n'],['father','n'],['person','n'],
      ['people','n'],['place','n'],['thing','n'],['time','n'],['year','n'],['way','n'],
      // verbs (base forms / common)
      ['jumps','v'],['jump','v'],['run','v'],['runs','v'],['swim','v'],['swims','v'],['give','v'],
      ['gave','v'],['is','v'],['are','v'],['was','v'],['were','v'],['became','v'],['become','v'],
      ['consider','v'],['considers','v'],['played','v'],['play','v'],['walked','v'],['walk','v'],
      ['sat','v'],['sit','v'],['runs','v'],['running','v'],['ate','v'],['eat','v'],['see','v'],
      ['saw','v'],['make','v'],['made','v'],['do','v'],['does','v'],['did','v'],['have','v'],
      ['has','v'],['had','v'],['say','v'],['said','v'],['get','v'],['got','v'],['go','v'],
      ['went','v'],['come','v'],['came','v'],['take','v'],['took','v'],['call','v'],['called','v'],
      // adjectives
      ['quick','adj'],['brown','adj'],['lazy','adj'],['old','adj'],['young','adj'],['happy','adj'],
      ['sad','adj'],['kind','adj'],['friendly','adj'],['beautiful','adj'],['tall','adj'],['short','adj'],
      ['big','adj'],['small','adj'],['large','adj'],['little','adj'],['good','adj'],['bad','adj'],
      ['new','adj'],['old','adj'],['first','adj'],['last','adj'],['long','adj'],['high','adj'],
      ['great','adj'],['important','adj'],['different','adj'],['same','adj'],['own','adj'],
      // adverbs
      ['quickly','adv'],['slowly','adv'],['happily','adv'],['sadly','adv'],['very','adv'],
      ['quite','adv'],['too','adv'],['really','adv'],['always','adv'],['never','adv'],
      ['often','adv'],['sometimes','adv'],['now','adv'],['then','adv'],['here','adv'],['there','adv'],
      ['well','adv'],['badly','adv'],['only','adv'],['just','adv'],['also','adv'],
      // prepositions
      ['over','prep'],['under','prep'],['on','prep'],['in','prep'],['at','prep'],['by','prep'],
      ['with','prep'],['from','prep'],['to','prep'],['for','prep'],['of','prep'],['off','prep'],
      ['through','prep'],['after','prep'],['before','prep'],['between','prep'],['against','prep'],
      ['during','prep'],['without','prep'],['along','prep'],['around','prep'],['about','prep'],
      // conjunctions
      ['and','conj'],['or','conj'],['but','conj'],['nor','conj'],['yet','conj'],['so','conj'],
      // pronouns
      ['i','pron'],['you','pron'],['he','pron'],['she','pron'],['it','pron'],['we','pron'],
      ['they','pron'],['me','pron'],['him','pron'],['her','pron'],['us','pron'],['them','pron'],
      // extra
      ['a','det'],['an','det'],['the','det'],['that','det'],['this','det'],
    ]);

    // tagger (simple rule + dictionary)
    function tagWord(w) {
      const lower = w.toLowerCase().replace(/[^a-z]/g,'');
      if (!lower) return 'unk';
      if (dict.has(lower)) return dict.get(lower);
      if (lower.endsWith('ed') || lower.endsWith('ing')) return 'v';
      if (lower.endsWith('ly')) return 'adv';
      if (lower.endsWith('s') && !lower.endsWith('ss')) return 'n';
      return 'n'; // fallback noun
    }

    // parse sentence into tagged tokens
    function parseSentence(text) {
      const tokens = text.trim().split(/\s+/);
      return tokens.map((word, idx) => {
        const clean = word.replace(/[^a-zA-Z]/g,'');
        const pos = tagWord(clean);
        return { word: clean, pos, original: word, index: idx };
      });
    }

    // ---------- diagram builder (SVG) ----------
    function buildDiagram(sentence) {
      const svg = document.getElementById('diagramSvg');
      const tokens = parseSentence(sentence);
      if (tokens.length === 0) { svg.innerHTML = ''; return; }

      // simple rule-based roles (heuristic)
      let subjectIdx = -1, verbIdx = -1, objectIdx = -1;
      let subject = '', verb = '', object = '';
      // find first noun/pronoun as subject, first verb as predicate, next noun as object
      for (let i = 0; i < tokens.length; i++) {
        const t = tokens[i];
        if (subjectIdx === -1 && (t.pos === 'n' || t.pos === 'pron' || t.pos === 'det')) {
          subjectIdx = i; subject = t.word; continue;
        }
        if (verbIdx === -1 && (t.pos === 'v')) {
          verbIdx = i; verb = t.word; continue;
        }
        if (objectIdx === -1 && subjectIdx !== -1 && verbIdx !== -1 && (t.pos === 'n' || t.pos === 'pron')) {
          objectIdx = i; object = t.word; break;
        }
      }
      if (subjectIdx === -1) { subjectIdx = 0; subject = tokens[0].word; }
      if (verbIdx === -1) { verbIdx = Math.min(1, tokens.length-1); verb = tokens[verbIdx].word; }

      // build diagram lines (Reed-Kellogg simplified)
      const w = 800, h = 400;
      let svgContent = `<rect width="${w}" height="${h}" fill="#0d0d0d" rx="12" />`;
      
      // baseline (subject | verb)
      const baseX = 180, baseY = 160, segmentLen = 140;
      const subX = baseX, verbX = baseX + segmentLen + 20;
      // horizontal line
      svgContent += `<line x1="${subX}" y1="${baseY}" x2="${verbX + 80}" y2="${baseY}" stroke="#ff7043" stroke-width="2.5" />`;
      // vertical separator
      svgContent += `<line x1="${baseX + segmentLen}" y1="${baseY - 20}" x2="${baseX + segmentLen}" y2="${baseY + 20}" stroke="#ff7043" stroke-width="1.5" />`;

      // subject label (green)
      svgContent += `<text x="${subX + 20}" y="${baseY - 8}" fill="#66bb6a" font-size="16" font-weight="500">${subject}</text>`;
      // predicate (blue)
      svgContent += `<text x="${verbX - 10}" y="${baseY - 8}" fill="#42a5f5" font-size="16" font-weight="500">${verb}</text>`;

      // direct object (if any) — slanted line
      if (object && objectIdx > verbIdx) {
        const objX = verbX + 90, objY = baseY + 50;
        svgContent += `<line x1="${verbX + 40}" y1="${baseY}" x2="${objX}" y2="${objY}" stroke="#ab47bc" stroke-width="1.5" stroke-dasharray="4 2" />`;
        svgContent += `<text x="${objX - 10}" y="${objY + 18}" fill="#ab47bc" font-size="15">${object}</text>`;
      }

      // modifiers: adjectives, adverbs, prepositional phrases (slanted lines)
      let modY = baseY - 40;
      tokens.forEach((t, idx) => {
        if (idx === subjectIdx || idx === verbIdx || idx === objectIdx) return;
        const isAdj = t.pos === 'adj' || t.pos === 'det';
        const isAdv = t.pos === 'adv';
        const isPrep = t.pos === 'prep';
        if (isAdj || isAdv || isPrep) {
          modY -= 22;
          const startX = (idx < subjectIdx) ? subX + 30 : verbX + 20;
          const endX = startX + 60 + (idx * 7) % 40;
          const endY = baseY + modY;
          svgContent += `<line x1="${startX}" y1="${baseY - 10}" x2="${endX}" y2="${endY}" stroke="#888" stroke-width="1.2" />`;
          const color = isAdj ? '#ffa726' : (isAdv ? '#26c6da' : '#bdbdbd');
          svgContent += `<text x="${endX - 10}" y="${endY - 6}" fill="${color}" font-size="13">${t.word}</text>`;
        }
      });

      // conjunctions (forked)
      tokens.forEach((t, idx) => {
        if (t.pos === 'conj') {
          const cx = (idx < subjectIdx) ? subX - 30 : verbX + 120;
          const cy = baseY - 30;
          svgContent += `<line x1="${cx}" y1="${baseY}" x2="${cx}" y2="${cy}" stroke="#ff7043" stroke-width="1.5" />`;
          svgContent += `<text x="${cx - 12}" y="${cy - 6}" fill="#ff7043" font-size="14">${t.word}</text>`;
        }
      });

      // extra words (fallback)
      tokens.forEach((t, idx) => {
        if (idx === subjectIdx || idx === verbIdx || idx === objectIdx) return;
        if (t.pos === 'conj' || t.pos === 'adj' || t.pos === 'adv' || t.pos === 'prep') return;
        // other (maybe noun)
        const x = 600, y = 300 + (idx % 4)*20;
        svgContent += `<text x="${x}" y="${y}" fill="#aaa" font-size="12">${t.word}</text>`;
      });

      svg.innerHTML = svgContent;
    }

    // manual adjustment: drag circles (simple)
    // attach drag to SVG? we add small draggable circles for demo
    function enableDrag() {
      // no full implementation for brevity, but we add circles as placeholders
      const svg = document.getElementById('diagramSvg');
      // add invisible draggable circles over baseline (concept)
    }

    // preload examples
    function loadExample(sentence) {
      document.getElementById('sentenceInput').value = sentence;
      buildDiagram(sentence);
    }

    // init
    document.addEventListener('DOMContentLoaded', function() {
      const input = document.getElementById('sentenceInput');
      const diagramBtn = document.getElementById('diagramBtn');
      
      // default diagram
      buildDiagram(input.value);

      diagramBtn.addEventListener('click', function() {
        buildDiagram(input.value);
      });

      // example buttons
      document.querySelectorAll('.example-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const sentence = this.dataset.sentence;
          loadExample(sentence);
        });
      });

      // drag simulation: click on word to toggle label (simple)
      document.getElementById('diagramSvg').addEventListener('click', function(e) {
        const target = e.target;
        if (target.tagName === 'text') {
          const current = target.getAttribute('fill');
          target.setAttribute('fill', current === '#ff7043' ? '#e0e0e0' : '#ff7043');
        }
      });

      // extra: keyboard enter
      input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          diagramBtn.click();
        }
      });
    });

    // expose for debugging
    window.buildDiagram = buildDiagram;
  })();
</script>
