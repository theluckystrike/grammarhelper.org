<body>
<div class="container">
  <header>
    <h1>🔁 Active ↔ Passive Voice</h1>

  </header>

  <!-- main converter -->
  <div class="card">
    <label for="inputSentence" style="font-weight:500; display:block; margin-bottom:0.5rem;">✏️ Enter a sentence (or multiple lines for batch)</label>
    <textarea id="inputSentence" rows="3" placeholder="e.g. The cat chased the mouse. / The mouse was chased by the cat.">The chef cooked a delicious meal.</textarea>
    <div class="flex-row">
      <button id="convertBtn">🔄 Convert / Detect</button>
      <button id="batchBtn" style="background:#3a3a3a; color:#e0e0e0;">📊 Batch mode & stats</button>
    </div>

      <span style="color:#aaa;">📌 Example sentences: </span>

    </div>
  </div>

  <!-- result panel -->
  <div id="resultPanel" class="card" style="display:none;">
    <h3 style="display:flex; gap:1rem; align-items:center;">📋 Result <span id="voiceBadge" class="badge"></span></h3>
    <div id="conversionSteps"></div>
    <div id="highlightedText" style="margin-top:1rem; background:#1a1a1a; padding:0.8rem 1.2rem; border-radius:30px;"></div>
  </div>

  <!-- batch statistics panel -->
  <div id="batchPanel" class="card" style="display:none;">

    <div id="batchResultList"></div>
  </div>

  <footer class="footer">

  </footer>

<script>
  (function() {
    // ---------- rule-based passive detection ----------
    function isPassive(sentence) {
      // pattern: (is|are|was|were|been|be) + past participle (optional 'by')
      const passiveRegex = /\b(?:is|are|was|were|been|be)\s+(?:\w+ed|built|driven|written|spoken|taken|given|broken|eaten|known|shown|taught|bought|caught|sold|told|kept|left|lost|made|met|paid|put|run|set|stood|thought|understood|won)\b/i;
      // also check for 'by' phrase to increase confidence, but basic pattern is enough
      return passiveRegex.test(sentence);
    }

    // detect voice with more precise: be + past participle (common irregulars)
    function detectVoice(sentence) {
      const trimmed = sentence.trim();
      if (!trimmed) return 'unknown';
      // common past participles (regular + irregular)
      const pastParticiples = '(?:\\w+ed|built|driven|written|spoken|taken|given|broken|eaten|known|shown|taught|bought|caught|sold|told|kept|left|lost|made|met|paid|put|run|set|stood|thought|understood|won|brought|sought|sent|found|held|led|read|heard|gone|seen|done|said|fallen|grown|hidden|begun|swum)';
      const passivePattern = new RegExp(`\\b(?:is|are|was|were|been|be)\\s+${pastParticiples}\\b`, 'i');
      if (passivePattern.test(trimmed)) return 'passive';
      // if contains 'by' + noun (heuristic) but not active? still check
      // additional: if it matches passive but no 'by' still passive
      // default active
      return 'active';
    }

    // convert sentence: active <-> passive (simplified rule-based)
    function convertVoice(sentence) {
      const voice = detectVoice(sentence);
      if (voice === 'unknown') return { original: sentence, converted: sentence, voice, steps: ['Could not detect voice.'] };

      let steps = [];
      let converted = '';
      const trimmed = sentence.trim();

      // ----- passive -> active -----
      if (voice === 'passive') {
        // extract subject (before verb) and agent (by ...)
        // pattern: Subject + be + past participle + (by agent) + rest
        const passiveMatch = trimmed.match(/^(.+?)\s+(is|are|was|were|been|be)\s+(\w+(?:ed|en|t|n|d|g|k|s|e|i|u)?)\s*(.*)/i);
        if (passiveMatch) {
          let subject = passiveMatch[1].trim();
          let beVerb = passiveMatch[2].trim();
          let pastPart = passiveMatch[3].trim();
          let rest = passiveMatch[4].trim();
          let agent = '';
          let afterAgent = '';
          const byIndex = rest.search(/\bby\b/i);
          if (byIndex !== -1) {
            agent = rest.slice(byIndex + 2).trim();
            afterAgent = rest.slice(0, byIndex).trim();
          } else {
            agent = 'someone'; // generic
            afterAgent = rest;
          }
          // rebuild active: agent + verb (tense) + object
          // determine tense from beVerb
          let tense = 'past'; // default
          if (/^is|are$/i.test(beVerb)) tense = 'present';
          else if (/^was|were$/i.test(beVerb)) tense = 'past';
          else if (/^been$/i.test(beVerb)) tense = 'perfect';
          else if (/^be$/i.test(beVerb)) tense = 'future';
          // verb base (heuristic: remove -ed/-en etc) — simplified
          let baseVerb = pastPart.replace(/(ed|en|t|n|d)$/i, '');
          if (baseVerb.length < 2) baseVerb = pastPart;
          // irregular mapping (tiny)
          const irregularMap = { ate: 'eat', eaten: 'eat', wrote: 'write', written: 'write', took: 'take', taken: 'take', broke: 'break', broken: 'break', drove: 'drive', driven: 'drive', gave: 'give', given: 'give', knew: 'know', known: 'know', saw: 'see', seen: 'see', spoke: 'speak', spoken: 'speak', built: 'build' };
          if (irregularMap[pastPart.toLowerCase()]) baseVerb = irregularMap[pastPart.toLowerCase()];
          // agent might be empty
          const agentClean = agent || 'someone';
          let activeSentence = '';
          if (tense === 'present') {
            activeSentence = agentClean + ' ' + baseVerb + (agentClean.toLowerCase()==='they'||agentClean.toLowerCase()==='i'?'':'s') + ' ' + afterAgent;
          } else if (tense === 'past') {
            activeSentence = agentClean + ' ' + (irregularMap[pastPart.toLowerCase()] ? irregularMap[pastPart.toLowerCase()] : baseVerb+'ed') + ' ' + afterAgent;
          } else if (tense === 'perfect') {
            activeSentence = agentClean + ' have ' + pastPart + ' ' + afterAgent;
          } else {
            activeSentence = agentClean + ' will ' + baseVerb + ' ' + afterAgent;
          }
          converted = activeSentence.trim();
          steps.push(`🔍 Detected passive voice: subject "${subject}", verb "${beVerb} ${pastPart}", agent "${agent}"`);
          steps.push(`🔄 Restructured: move agent to subject position, adjust verb tense (${tense})`);
          steps.push(`✅ Active: ${converted}`);
        } else {
          // fallback
          converted = trimmed.replace(/\bby\b/i, 'by ').replace(/^(.*?)\s+(was|were|is|are)\s+/, '$2 '); // dummy
          steps.push('Passive pattern detected (simple conversion)');
        }
      } else {
        // ----- active -> passive -----
        // simplistic: SVO -> O + be + past participle + by S
        const words = trimmed.split(' ');
        if (words.length < 3) {
          converted = trimmed;
          steps.push('Sentence too short to convert.');
        } else {
          // find verb (heuristic: second word often verb)
          let subject = words[0];
          let verb = words[1] || '';
          let object = words.slice(2).join(' ');
          // very basic
          const beForm = 'is';
          const pastPart = verb.replace(/s$/, '') + (verb.match(/[aeiou]/i) ? 'ed' : 'ed');
          converted = object + ' ' + beForm + ' ' + pastPart + ' by ' + subject;
          steps.push(`🔍 Detected active voice: subject "${subject}", verb "${verb}", object "${object}"`);
          steps.push(`🔄 Move object to subject, add "be + past participle", add "by + original subject"`);
          steps.push(`✅ Passive: ${converted}`);
        }
      }
      if (!converted) converted = trimmed;
      return { original: trimmed, converted, voice, steps };
    }

    // highlight passive constructions
    function highlightPassive(text) {
      const passiveRegex = /\b(is|are|was|were|been|be)\s+(\w+(?:ed|en|t|n|d|g|k|s|e|i|u)?)\b/gi;
      return text.replace(passiveRegex, (match) => `<span class="highlight-passive">${match}</span>`);
    }

    // 20 example sentences
    const examples = [
      "The cat chased the mouse.",
      "The mouse was chased by the cat.",
      "She writes a letter.",
      "A letter is written by her.",
      "They built a house.",
      "A house was built by them.",
      "The chef cooked a delicious meal.",
      "A delicious meal was cooked by the chef.",
      "The teacher explains the lesson.",
      "The lesson is explained by the teacher.",
      "The dog ate the bone.",
      "The bone was eaten by the dog.",
      "The children will finish the project.",
      "The project will be finished by the children.",
      "The storm destroyed the village.",
      "The village was destroyed by the storm.",
      "The company hired new workers.",
      "New workers were hired by the company.",
      "The artist painted a mural.",
      "A mural was painted by the artist."
    ];

    // populate examples
    const exampleContainer = document.getElementById('exampleList');
    examples.forEach(ex => {
      const span = document.createElement('span');
      span.className = 'example-tag';
      span.textContent = ex.length > 40 ? ex.slice(0,37)+'...' : ex;
      span.title = ex;
      span.addEventListener('click', () => {
        document.getElementById('inputSentence').value = ex;
        document.getElementById('convertBtn').click();
      });
      exampleContainer.appendChild(span);
    });

    const inputEl = document.getElementById('inputSentence');
    const convertBtn = document.getElementById('convertBtn');
    const batchBtn = document.getElementById('batchBtn');
    const resultPanel = document.getElementById('resultPanel');
    const voiceBadge = document.getElementById('voiceBadge');
    const conversionSteps = document.getElementById('conversionSteps');
    const highlightedText = document.getElementById('highlightedText');
    const batchPanel = document.getElementById('batchPanel');
    const statsBox = document.getElementById('statsBox');
    const batchResultList = document.getElementById('batchResultList');

    function renderConversion(sentence) {
      if (!sentence.trim()) return;
      const result = convertVoice(sentence);
      resultPanel.style.display = 'block';
      voiceBadge.textContent = result.voice.toUpperCase();
      voiceBadge.style.background = result.voice === 'passive' ? '#ff7043' : '#4caf50';
      // steps
      conversionSteps.innerHTML = result.steps.map(s => `<div class="step">${s}</div>`).join('');
      // highlighted
      highlightedText.innerHTML = highlightPassive(result.original) + ' → <strong>' + result.converted + '</strong>';
    }

    convertBtn.addEventListener('click', () => {
      const val = inputEl.value;
      if (!val.trim()) return;
      // single line mode (first line)
      const firstLine = val.split('\n')[0].trim();
      renderConversion(firstLine);
    });

    // batch mode
    batchBtn.addEventListener('click', () => {
      const text = inputEl.value;
      const lines = text.split('\n').filter(l => l.trim().length > 0);
      if (lines.length === 0) return;
      let activeCount = 0, passiveCount = 0;
      const results = lines.map(line => {
        const r = convertVoice(line);
        if (r.voice === 'active') activeCount++;
        else if (r.voice === 'passive') passiveCount++;
        return r;
      });
      batchPanel.style.display = 'block';
      const total = results.length;
      const activePct = total ? Math.round(activeCount/total*100) : 0;
      const passivePct = total ? Math.round(passiveCount/total*100) : 0;
      statsBox.innerHTML = `
        <div class="stat-item">📊 Total sentences: <strong>${total}</strong></div>
        <div class="stat-item" style="background:#2e7d32;">🟢 Active: ${activeCount} (${activePct}%)</div>
        <div class="stat-item" style="background:#bf360c;">🔴 Passive: ${passiveCount} (${passivePct}%)</div>
      `;
      let html = '';
      results.forEach((r, idx) => {
        html += `<div style="background:#1e1e1e; border-radius:20px; padding:0.8rem 1.2rem; margin:0.5rem 0;">
          <small>#${idx+1} [${r.voice}]</small> ${r.original} → <strong>${r.converted}</strong>
        </div>`;
      });
      batchResultList.innerHTML = html;
    });

    // auto-run on load with default sentence
    window.addEventListener('DOMContentLoaded', () => {
      renderConversion(inputEl.value.split('\n')[0].trim());
    });
  })();
</script>
</body>
